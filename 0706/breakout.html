<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벽돌깨기</title>
<style>
  :root {
    --bg-deep: #0b0e1a;
    --bg-panel: #12172a;
    --neon-cyan: #4ee3ff;
    --neon-pink: #ff4fa3;
    --neon-lime: #c6ff4e;
    --text-dim: #8a93b8;
    --text-bright: #eef1ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(circle at 50% -10%, #1a2148 0%, var(--bg-deep) 55%);
    font-family: 'Courier New', 'Malgun Gothic', monospace;
    color: var(--text-bright);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 16px;
  }

  .title {
    font-size: 28px;
    letter-spacing: 6px;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px rgba(78,227,255,0.7), 0 0 24px rgba(78,227,255,0.35);
    margin: 0 0 10px 0;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 640px;
    padding: 0 6px 8px 6px;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .hud span.value {
    color: var(--neon-lime);
    text-shadow: 0 0 6px rgba(198,255,78,0.6);
  }

  #stage {
    position: relative;
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(78,227,255,0.25), 0 0 40px rgba(78,227,255,0.12), inset 0 0 60px rgba(0,0,0,0.6);
    background: var(--bg-panel);
    overflow: hidden;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(11,14,26,0.72);
    backdrop-filter: blur(2px);
    text-align: center;
    transition: opacity 0.2s ease;
  }

  #overlay.hidden { display: none; }

  #overlay h2 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 3px;
  }

  #overlay p {
    margin: 0;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 1px;
  }

  .btn {
    margin-top: 6px;
    padding: 10px 26px;
    font-size: 14px;
    letter-spacing: 3px;
    font-family: inherit;
    color: var(--bg-deep);
    background: var(--neon-cyan);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 16px rgba(78,227,255,0.6);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 0 24px rgba(78,227,255,0.9); }
  .btn:active { transform: translateY(0); }

  .footer-hint {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-align: center;
  }

  .win-text { color: var(--neon-lime); text-shadow: 0 0 10px rgba(198,255,78,0.7); }
  .lose-text { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255,79,163,0.7); }
</style>
</head>
<body>
<div id="wrap">
  <div class="title">BRICK&nbsp;BREAKER</div>
  <div class="hud">
    <div>SCORE&nbsp;<span class="value" id="scoreVal">0</span></div>
    <div>LIVES&nbsp;<span class="value" id="livesVal">3</span></div>
    <div>STAGE&nbsp;<span class="value" id="stageVal">1</span></div>
  </div>
  <div id="stage">
    <canvas id="game" width="640" height="520"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">시작할 준비가 되셨나요?</h2>
      <p id="overlaySub">← → 화살표 또는 마우스/터치로 패들 이동 · 스페이스바로 발사</p>
      <button class="btn" id="startBtn">시작하기</button>
    </div>
  </div>
  <div class="footer-hint">스페이스바: 발사&nbsp;&nbsp;|&nbsp;&nbsp;← → 또는 마우스/터치: 패들 이동&nbsp;&nbsp;|&nbsp;&nbsp;P: 일시정지</div>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const startBtn = document.getElementById('startBtn');
  const scoreVal = document.getElementById('scoreVal');
  const livesVal = document.getElementById('livesVal');
  const stageVal = document.getElementById('stageVal');

  const COLORS = ['#ff4f7c', '#ff9f4f', '#ffe14f', '#c6ff4e', '#4effc0', '#4ee3ff'];

  const PADDLE_W = 100;
  const PADDLE_H = 14;
  const BALL_R = 8;

  let paddle, ball, bricks, score, lives, stage, state, particles;
  let leftPressed = false, rightPressed = false;
  let paused = false;

  function initGame(newStage) {
    stage = newStage || 1;
    paddle = { x: W / 2 - PADDLE_W / 2, y: H - 34, w: PADDLE_W, h: PADDLE_H, speed: 7 };
    resetBall();
    bricks = createBricks(stage);
    score = score || 0;
    lives = lives === undefined ? 3 : lives;
    particles = [];
    updateHud();
  }

  function resetBall() {
    ball = {
      x: paddle.x + paddle.w / 2,
      y: paddle.y - BALL_R - 1,
      r: BALL_R,
      speed: 5.2 + (stage - 1) * 0.35,
      dx: 0,
      dy: 0,
      launched: false
    };
  }

  function createBricks(stageNum) {
    const rows = 5 + Math.min(2, stageNum - 1);
    const cols = 10;
    const padding = 6;
    const topOffset = 44;
    const brickW = (W - padding * (cols + 1)) / cols;
    const brickH = 20;
    const arr = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // 스테이지가 올라갈수록 무작위로 빈 칸이 생겨 패턴이 달라짐
        if (stageNum > 1 && Math.random() < 0.06 * (stageNum - 1)) continue;
        const x = padding + c * (brickW + padding);
        const y = topOffset + r * (brickH + padding);
        arr.push({
          x, y, w: brickW, h: brickH,
          color: COLORS[r % COLORS.length],
          points: (rows - r) * 10,
          alive: true,
          hp: stageNum >= 3 && r === 0 ? 2 : 1
        });
      }
    }
    return arr;
  }

  function updateHud() {
    scoreVal.textContent = score;
    livesVal.textContent = lives;
    stageVal.textContent = stage;
  }

  function showOverlay(title, sub, btnLabel) {
    overlayTitle.textContent = title;
    overlaySub.textContent = sub;
    startBtn.textContent = btnLabel;
    overlay.classList.remove('hidden');
  }

  function hideOverlay() {
    overlay.classList.add('hidden');
  }

  // ---------- 입력 ----------
  document.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') leftPressed = true;
    if (e.code === 'ArrowRight') rightPressed = true;
    if (e.code === 'Space') {
      e.preventDefault();
      if (state === 'ready') launchBall();
      else if (state === 'gameover' || state === 'win') startBtn.click();
    }
    if (e.code === 'KeyP' && state === 'playing') {
      paused = !paused;
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') leftPressed = false;
    if (e.code === 'ArrowRight') rightPressed = false;
  });

  function pointerToCanvasX(clientX) {
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left) * (W / rect.width);
  }

  canvas.addEventListener('mousemove', (e) => {
    const x = pointerToCanvasX(e.clientX);
    setPaddleCenter(x);
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const x = pointerToCanvasX(e.touches[0].clientX);
    setPaddleCenter(x);
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    if (state === 'ready') launchBall();
  });

  canvas.addEventListener('click', () => {
    if (state === 'ready') launchBall();
  });

  function setPaddleCenter(x) {
    paddle.x = Math.max(0, Math.min(W - paddle.w, x - paddle.w / 2));
  }

  function launchBall() {
    if (state !== 'ready') return;
    state = 'playing';
    hideOverlay();
    const angles = [-0.9, -0.6, -0.35, 0.35, 0.6, 0.9];
    const a = angles[Math.floor(Math.random() * angles.length)];
    ball.dx = a * ball.speed;
    ball.dy = -Math.sqrt(Math.max(0.2, ball.speed * ball.speed - ball.dx * ball.dx));
    ball.launched = true;
  }

  // ---------- 파티클(벽돌 파괴 효과) ----------
  function spawnParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4 - 1,
        life: 24,
        color
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 24);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  // ---------- 충돌 처리 ----------
  function handleCollisions() {
    // 패들
    if (ball.dy > 0 &&
        ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w &&
        ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h) {
      const offset = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const clamped = Math.max(-1, Math.min(1, offset));
      const speed = Math.hypot(ball.dx, ball.dy);
      const maxAngle = Math.PI * 0.4;
      const angle = clamped * maxAngle;
      ball.dx = speed * Math.sin(angle);
      ball.dy = -Math.abs(speed * Math.cos(angle));
      ball.y = paddle.y - ball.r - 1;
    }

    // 벽돌
    for (const b of bricks) {
      if (!b.alive) continue;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {

        b.hp -= 1;
        if (b.hp <= 0) {
          b.alive = false;
          score += b.points;
          spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);
        } else {
          score += Math.floor(b.points / 2);
        }
        updateHud();

        const overlapLeft = (ball.x + ball.r) - b.x;
        const overlapRight = (b.x + b.w) - (ball.x - ball.r);
        const overlapTop = (ball.y + ball.r) - b.y;
        const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

        if (minOverlap === overlapLeft || minOverlap === overlapRight) {
          ball.dx *= -1;
        } else {
          ball.dy *= -1;
        }
        break;
      }
    }

    // 바닥
    if (ball.y - ball.r > H) {
      lives -= 1;
      updateHud();
      if (lives <= 0) {
        state = 'gameover';
        showOverlay('게임 오버', `최종 점수 ${score}점 · 스페이스바로 다시 시작`, '다시 시작');
      } else {
        state = 'ready';
        resetBall();
        showOverlay('아쉽네요!', '스페이스바 또는 클릭으로 다시 발사', '발사 준비');
      }
    }

    // 승리 (스테이지 클리어)
    if (bricks.every(b => !b.alive)) {
      state = 'win';
      showOverlay(`STAGE ${stage} 클리어!`, `현재 점수 ${score}점 · 다음 스테이지로 이동`, '다음 스테이지');
    }
  }

  // ---------- 업데이트 & 렌더 ----------
  function update() {
    if (paused) return;

    if (leftPressed) paddle.x -= paddle.speed;
    if (rightPressed) paddle.x += paddle.speed;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    if (state === 'ready') {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 1;
    } else if (state === 'playing') {
      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx *= -1; }
      else if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.dx *= -1; }
      if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy *= -1; }

      handleCollisions();
    }
    updateParticles();
  }

  function drawBackground() {
    ctx.fillStyle = '#12172a';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(78,227,255,0.05)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 32) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawBricks() {
    for (const b of bricks) {
      if (!b.alive) continue;
      ctx.fillStyle = b.color;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = b.hp > 1 ? 14 : 6;
      roundRect(b.x, b.y, b.w, b.h, 4);
      ctx.fill();
      ctx.shadowBlur = 0;
      if (b.hp > 1) {
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 2;
        roundRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2, 3);
        ctx.stroke();
      }
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawPaddle() {
    ctx.fillStyle = '#4ee3ff';
    ctx.shadowColor = '#4ee3ff';
    ctx.shadowBlur = 12;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawBall() {
    ctx.beginPath();
    ctx.fillStyle = '#eef1ff';
    ctx.shadowColor = '#eef1ff';
    ctx.shadowBlur = 10;
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function draw() {
    drawBackground();
    drawBricks();
    drawParticles();
    drawPaddle();
    drawBall();

    if (paused && state === 'playing') {
      ctx.fillStyle = 'rgba(11,14,26,0.6)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#4ee3ff';
      ctx.font = '28px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('일시정지 (P)', W / 2, H / 2);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // ---------- 시작 버튼 ----------
  startBtn.addEventListener('click', () => {
    if (state === 'gameover') {
      score = 0;
      lives = 3;
      initGame(1);
      state = 'ready';
      showOverlay('시작할 준비가 되셨나요?', '← → 화살표 또는 마우스/터치로 패들 이동 · 스페이스바로 발사', '시작하기');
    } else if (state === 'win') {
      initGame(stage + 1);
      state = 'ready';
      showOverlay('시작할 준비가 되셨나요?', '← → 화살표 또는 마우스/터치로 패들 이동 · 스페이스바로 발사', '시작하기');
    } else if (state === 'ready' || state === undefined) {
      hideOverlay();
      if (state === undefined) {
        score = 0; lives = 3;
        initGame(1);
      }
      state = 'ready';
      launchBall();
    }
  });

  // ---------- 초기화 ----------
  score = 0;
  lives = 3;
  initGame(1);
  state = 'ready';
  loop();
})();
</script>
</body>
</html>
